name: Scheduled UI Tests

on:
  schedule:
    - cron: '0 */2 * * *'  # 每 2 小时运行一次
  workflow_dispatch:  # 手动触发

jobs:
  gstack-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Start Dev Server
        run: pnpm dev &
        env:
          TAURI_MODE: dev

      - name: Wait for server
        run: sleep 30

      - name: Run UI Tests
        run: |
          echo "UI tests would run here with gstack or similar tool"
          echo "Verify http://localhost:1420 is accessible"
          curl -f http://localhost:1420 || exit 1

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-screenshots
          path: artifacts/
          retention-days: 7
